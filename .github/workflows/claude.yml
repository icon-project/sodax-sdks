name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Bash(pnpm *),Bash(node *),Bash(npx *),Bash(git *),Bash(gh *),Bash(ls *),Bash(cat *),Bash(find *),Bash(head *),Bash(tail *),Bash(wc *),Bash(sort *),Bash(grep *),Bash(echo *),Bash(pwd),Bash(which *),Bash(env),Bash(curl *),Bash(jq *),Bash(mkdir *),Bash(cp *),WebFetch,WebSearch"
            --system-prompt "You are working on sodax-sdks, a TypeScript monorepo using pnpm workspaces. Key packages: @sodax/sdk (packages/sdk), @sodax/types (packages/types), @sodax/dapp-kit (packages/dapp-kit), @sodax/wallet-sdk-core (packages/wallet-sdk-core) and @sodax/wallet-sdk-react (packages/wallet-sdk-react). Use pnpm for all package management. Follow Biome linting rules (biome.json at repo root). Use strict TypeScript with ESM imports (.js extensions in source). When implementing features, prefer editing existing files over creating new ones. Keep changes focused and avoid over-engineering. You have access to other repos in the icon-project org via the gh CLI — use it to read issues, PRs, and code from related repos when needed."
