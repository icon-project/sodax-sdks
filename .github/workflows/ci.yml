name: CI

on:
  push:
    branches:
      - main
      - development
  pull_request:
    types: [opened, synchronize]

jobs:
  build:
    name: Build and Test
    timeout-minutes: 10
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ['24.x']

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check Circular Dependencies
        run: pnpm check:circular-deps

      - name: Build Packages
        run: pnpm build:packages

      - name: Check Package Types & Exports (attw)
        run: pnpm check-exports

      - name: SDK tarball size check
        env:
          SODAX_SDK_TARBALL_BASELINE_BYTES: '726000'
          SODAX_SDK_TARBALL_TOLERANCE_PCT: '15'
        run: pnpm --filter @sodax/sdk size:check

      - name: Build Check
        run: pnpm checkTs

      - name: AI-exported docs guards (sdk, wallet-sdk-react, dapp-kit)
        run: pnpm check:ai

      - name: Build Apps
        run: pnpm turbo run build --filter='./apps/*' --filter='!./apps/node'

      - name: Run Tests
        run: pnpm test
