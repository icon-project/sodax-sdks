name: CI

on:
  push:
    branches:
      - main
      - development
  pull_request:
    types: [opened, synchronize]

jobs:
  build:
    name: Build and Test
    timeout-minutes: 10
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ['24.x']

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check Circular Dependencies
        run: pnpm check:circular-deps

      - name: Build Packages
        run: pnpm build:packages
      - name: CJS Compatibility Check
        run: cd apps/node-cjs && pnpm test

      - name: Build Check
        run: pnpm checkTs

      - name: Check ai-exported docs reference real exports (wallet-sdk-react)
        run: pnpm -C packages/wallet-sdk-react run check:ai-exported

      - name: Type-check ai-exported examples (wallet-sdk-react)
        run: pnpm -C packages/wallet-sdk-react run checkTs:examples

      - name: Check ai-exported relative links resolve (wallet-sdk-react)
        run: pnpm -C packages/wallet-sdk-react run check:ai-links

      - name: Check ai-exported @sodax/wallet-sdk-react imports compile
        run: pnpm -C packages/wallet-sdk-react run check:ai-imports

      - name: Check ai-exported docs reference real Sodax members
        run: pnpm -C packages/sdk run check:ai-exported

      - name: Check ai-exported scope (Core SDK only — no React/dapp-kit/wallet-sdk-react)
        run: pnpm -C packages/sdk run check:ai-scope

      - name: Check ai-exported relative links resolve
        run: pnpm -C packages/sdk run check:ai-links

      - name: Check ai-exported @sodax/sdk imports compile
        run: pnpm -C packages/sdk run check:ai-imports

      - name: Check dapp-kit ai-exported hooks reference real exports
        run: pnpm -C packages/dapp-kit run check:ai-exported

      - name: Check dapp-kit ai-exported scope (no forbidden sibling-package imports)
        run: pnpm -C packages/dapp-kit run check:ai-scope

      - name: Check dapp-kit ai-exported relative links resolve
        run: pnpm -C packages/dapp-kit run check:ai-links

      - name: Check dapp-kit ai-exported @sodax/dapp-kit imports compile
        run: pnpm -C packages/dapp-kit run check:ai-imports

      - name: Check dapp-kit ai-exported ts/tsx code blocks typecheck
        run: pnpm -C packages/dapp-kit run check:ai-snippets

      - name: Check dapp-kit ai-exported queryKey/mutationKey segments match source
        run: pnpm -C packages/dapp-kit run check:ai-keys

      - name: Check dapp-kit ai-exported polling-interval claims match source
        run: pnpm -C packages/dapp-kit run check:ai-consistency

      - name: Build
        run: pnpm build

      - name: Run Tests
        run: pnpm test
