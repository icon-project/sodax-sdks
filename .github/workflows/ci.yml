name: CI

on:
  push:
    branches:
      - main
      - development
  pull_request:
    types: [opened, synchronize]

jobs:
  build:
    name: Build and Test
    timeout-minutes: 10
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ['24.x']

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check Circular Dependencies
        run: pnpm check:circular-deps

      - name: Build Packages
        run: pnpm build:packages

      - name: Build Check
        run: pnpm checkTs

      - name: AI docs validation
        run: pnpm check:ai

      - name: Build Apps
        run: pnpm turbo run build --filter='./apps/*' --filter='!./apps/node'

      - name: Run Tests
        run: pnpm test
