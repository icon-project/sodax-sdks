name: Publish @sodax/sdk Package to npmjs

on:
  push:
    tags:
      - '@sodax/sdk@*.*.*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Validate tag matches package.json and determine dist-tag
        id: dist_tag
        run: |
          EXPECTED_VERSION="${GITHUB_REF_NAME#@sodax/sdk@}"
          ACTUAL_VERSION=$(jq -r .version packages/sdk/package.json)
          if [[ "$EXPECTED_VERSION" != "$ACTUAL_VERSION" ]]; then
            echo "::error::Git tag version ($EXPECTED_VERSION) does not match packages/sdk/package.json version ($ACTUAL_VERSION)"
            exit 1
          fi
          if [[ "$EXPECTED_VERSION" == *-* ]]; then
            PRERELEASE_ID="${EXPECTED_VERSION#*-}"
            TAG="${PRERELEASE_ID%%.*}"
          else
            TAG="latest"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Packages
        run: pnpm turbo run build --filter=@sodax/sdk...
      - name: Publish package
        run: |
          cd packages/sdk
          pnpm publish --no-git-checks --provenance --access public --tag "$DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{secrets.SODAX_SDKS_NPM_PUBLISH_TOKEN}}
          DIST_TAG: ${{ steps.dist_tag.outputs.tag }}